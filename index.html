<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Beast Designer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Audiowide&family=Bebas+Neue&family=Black+Ops+One&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Pacifico&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Audiowide&family=Bebas+Neue&family=Black+Ops+One&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Pacifico&family=Rubik+Moonrocks&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="sense"></div>
    <div class="about_me">
      <div class="cut">
        <svg
          width="30"
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="currentColor"
        >
          <path
            d="M12 22C6.47715 22 2 17.5228 2 12C2 6.47715 6.47715 2 12 2C17.5228 2 22 6.47715 22 12C22 17.5228 17.5228 22 12 22ZM12 20C16.4183 20 20 16.4183 20 12C20 7.58172 16.4183 4 12 4C7.58172 4 4 7.58172 4 12C4 16.4183 7.58172 20 12 20ZM12 10.5858L14.8284 7.75736L16.2426 9.17157L13.4142 12L16.2426 14.8284L14.8284 16.2426L12 13.4142L9.17157 16.2426L7.75736 14.8284L10.5858 12L7.75736 9.17157L9.17157 7.75736L12 10.5858Z"
          ></path>
        </svg>
      </div>
    </div>
    <header>
      <nav>
        <div class="logo"></div>
        <div class="options">
          <ul>
            <a href="#home"><li>Home</li></a>
            <a href="#desingsPath"><li>Designs</li></a>
            <a href="#connect"><li>Connect</li></a>
          </ul>
        </div>
        <div class="info">
          <svg
            width="30"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="currentColor"
          >
            <path
              d="M12 22C6.47715 22 2 17.5228 2 12 2 6.47715 6.47715 2 12 2 17.5228 2 22 6.47715 22 12 22 17.5228 17.5228 22 12 22ZM12 20C16.4183 20 20 16.4183 20 12 20 7.58172 16.4183 4 12 4 7.58172 4 4 7.58172 4 12 4 16.4183 7.58172 20 12 20ZM13 10.5V15H14V17H10V15H11V12.5H10V10.5H13ZM13.5 8C13.5 8.82843 12.8284 9.5 12 9.5 11.1716 9.5 10.5 8.82843 10.5 8 10.5 7.17157 11.1716 6.5 12 6.5 12.8284 6.5 13.5 7.17157 13.5 8Z"
            ></path>
          </svg>
          <p>About me</p>
        </div>
      </nav>
    </header>
    <main>
      <div class="first">
        <div id="home"></div>
        <div class="astro">K</div>
        <div class="images">
          <div
            class="photoshop"
            style="
              top: 30%;
              rotate: -30deg;
              left: 25vw;
              background-image: url(&quot;./src/images/photoshop.png&quot;);
            "
          ></div>
          <div
            class="illustrator"
            style="
              top: 25%;
              rotate: 25deg;
              right: 25vw;
              cursor: grab;
              background-image: url(&quot;./src/images/illustrator.png&quot;);
            "
          ></div>
          <div
            class="lightroom"
            style="
              bottom: 20%;
              rotate: 5deg;
              right: 15vw;
              cursor: grab;
              background-image: url(&quot;./src/images/lightroom.png&quot;);
            "
          ></div>
          <div
            class="figma"
            style="
              bottom: 20%;
              rotate: 15deg;
              left: 25vw;
              cursor: grab;
              background-image: url(&quot;./src/images/figma.png&quot;);
            "
          ></div>
          <div
            class="canva"
            style="
              bottom: 9%;
              rotate: 5deg;
              border-radius: 50%;
              right: 52vw;
              cursor: grab;
              background-image: url(&quot;./src/images/canva.jpeg&quot;);
            "
          ></div>
          <div class="express"
          style="top: 20%;
          height: 58px;
          width: 70px;
              rotate: 5deg;
              right: 52vw;
              background-size: cover;
              cursor: grab;
              background-image: url(&quot;./src/images/adobeexpress.jpeg&quot;);">

          </div>
        </div>

        <p></p>
        <h1>
          <span> Hello, I'm </span>
          Amanjeet
        </h1>
      </div>
      <div class="second">
        <p class="headline" id="secondpage">Designs</p>
        <div class="designs">
          <!-- cards as project -->
        </div>
        <div id="desingsPath"></div>
      </div>

      <div class="third">
        <div id="connect"></div>
        <h3>Let's Connect</h3>
        <form action="POST">
          <label for="name">
            <input type="text" placeholder="Name" />
          </label>
          <label for="name">
            <input type="text" placeholder="Email" />
          </label>
          <br />
          <label for="message">
            <textarea
              name="message"
              id="message"
              placeholder="Message"
            ></textarea>
          </label>
          <button type="submit">Connect</button>

          <div class="social_media">
            <ul>
              <li>instagram</li>
              <li>pintrest</li>
            </ul>
          </div>
        </form>
      </div>
    </main>
    <footer></footer>

    <script src="script.js"></script>
  </body>
</html>
